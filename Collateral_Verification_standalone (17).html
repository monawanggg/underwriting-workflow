// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────

// before our handler exists and the toolbar toggle would silently no-op.

// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.

  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function DocumentPreviewModal({ open, onClose, title, subtitle, pages, onConfirm, confirmLabel, onFlag }) {
  const [page, setPage] = React.useState(1);
  const [confirmed, setConfirmed] = React.useState(false);
  const total = pages.length;
  const Page = pages[page - 1];

  // Reset page when reopened
  React.useEffect(() => { if (open) { setPage(1); setConfirmed(false); } }, [open]);

  // Esc to close
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setPage(p => Math.min(total, p + 1));
      if (e.key === 'ArrowLeft')  setPage(p => Math.max(1, p - 1));
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, total, onClose]);

  const handleConfirm = () => {
    setConfirmed(true);
    setTimeout(() => {
      onClose();
      if (onConfirm) onConfirm();
    }, 600);
  };

  if (!open) return null;

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0,
        background: 'rgba(16, 24, 40, 0.55)',
        backdropFilter: 'blur(2px)',
        zIndex: 1000,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 24,
        animation: 'sn-doc-fade 180ms ease-out',

    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 'min(960px, 100%)',
          maxHeight: 'calc(100vh - 48px)',
          background: 'var(--sn-gray-50, #F9FAFB)',
          border: '1px solid var(--sn-gray-200)',
          borderRadius: 14,
          boxShadow: '0 24px 64px rgba(16, 24, 40, 0.30)',
          display: 'flex', flexDirection: 'column',
          overflow: 'hidden',
          animation: 'sn-doc-rise 220ms cubic-bezier(0.22, 1, 0.36, 1)',
        }}

        {/* Header */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '14px 18px',
          background: '#fff',
          borderBottom: '1px solid var(--sn-gray-200)',
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: 10,
            background: 'var(--sn-primary-bg, rgba(16,104,244,0.08))',

          </div>

          {/* Pager */}
          <div style={{display: 'inline-flex', alignItems: 'center', gap: 6, marginRight: 4}}>
            <button
              onClick={() => setPage(p => Math.max(1, p - 1))}
              disabled={page === 1}
              style={pagerBtn(page === 1)}
              aria-label="Previous page"
            >
              <Icon.ChevronLeft size={14}/>
            </button>
            <div style={{
              fontSize: 12, color: 'var(--sn-gray-700)',

              padding: '0 6px', minWidth: 76, textAlign: 'center',
            }}>
              Page {page} of {total}

            <button
              onClick={() => setPage(p => Math.min(total, p + 1))}
              disabled={page === total}
              style={pagerBtn(page === total)}
              aria-label="Next page"
            >
              <Icon.ChevronRight size={14}/>
            </button>

                  Ownership confirmed — returning to action items…
                </span>
              </div>
            ) : (
              <>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{fontSize: 12, fontWeight: 600, color: 'var(--sn-gray-900)'}}>
                    Aria has verified ownership via the Fidelity statement.
                  </div>
                  <div style={{fontSize: 11, color: 'var(--sn-gray-500)', marginTop: 1}}>
                    Review and continue — or flag an issue if something looks wrong.
                    {page < 4 && <span style={{color: 'var(--sn-primary)', fontWeight: 600, marginLeft: 6, cursor: 'pointer'}} onClick={() => setPage(4)}>See ownership page →</span>}
                  </div>
                </div>

                {/* Flag issue — ghost */}

                    background: 'transparent', color: 'var(--sn-error-fg)',

}

<script type="text/babel">
// ============================================================
// primitives.jsx
// ============================================================
/* ============================================================
   Primitive components: pills, avatars, helpers
   ============================================================ */

const fmtMoney = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtMoneyFull = (n) => n.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
const fmtPct = (n, d=0) => (n*100).toFixed(d) + '%';
const fmtNum = (n) => n.toLocaleString('en-US');

/** Pill — kind: success | warning | error | info | neutral */
function Pill({ kind='neutral', dot=true, children, style }) {
  return (
    <span className={`sn-pill sn-pill-${kind}`} style={style}>
      {dot && <span className="sn-dot" />}
      {children}
    </span>
  );
}

/** Status pill with icon (used in big cards) */
function StatusPill({ kind='success', label, icon }) {
  const cfg = {
    success: { bg: 'var(--sn-success-light)', fg: 'var(--sn-success-fg)', border: 'var(--sn-success-border)', defaultIcon: <Icon.Check size={12}/> },
    warning: { bg: 'var(--sn-warning-light)', fg: 'var(--sn-warning-fg)', border: 'var(--sn-warning-border)', defaultIcon: <Icon.AlertTriangle size={12}/> },
    error:   { bg: 'var(--sn-error-light)',   fg: 'var(--sn-error-fg)',   border: 'var(--sn-error-border)',   defaultIcon: <Icon.AlertTriangle size={12}/> },
    info:    { bg: 'var(--sn-primary-bg)',    fg: 'var(--sn-primary)',    border: 'var(--sn-primary-bg-2)',   defaultIcon: <Icon.Info size={12}/> },
    neutral: { bg: 'var(--sn-gray-100)',      fg: 'var(--sn-gray-600)',   border: 'var(--sn-gray-200)',       defaultIcon: null },
  }[kind];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      height: 26, padding: '0 10px',
      background: cfg.bg, color: cfg.fg, border: `1px solid ${cfg.border}`,
      borderRadius: 999,
      fontSize: 12, fontWeight: 600,
    }}>
      {icon || cfg.defaultIcon}
      {label}
    </span>
  );
}

/** Avatar — initials, color from a hash */
function Avatar({ name, size=28, color, role }) {
  const initials = name.split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase();
  const bg = color || 'var(--sn-primary)';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: bg,
      color: '#fff',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size <= 24 ? 9 : 11, fontWeight: 700,
      flexShrink: 0,
      letterSpacing: 0.2,
    }} title={name}>
      {initials}
    </div>
  );
}

/** Avatar styled for AI (Aria) */
function AriaAvatar({ size=28 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: 'linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%)',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0,
      boxShadow: '0 1px 3px rgba(30, 58, 138, 0.3)',
    }}>
      <Icon.Sparkle size={size * 0.5} style={{ color: '#fff' }} />
    </div>
  );
}

/** A button-shaped chip used for inline actions */
function ChipButton({ children, onClick, kind='default', icon, style, title }) {
  const palette = {
    default: { bg: 'var(--sn-white)', fg: 'var(--sn-gray-700)', border: 'var(--sn-gray-300)', hover: 'var(--sn-gray-50)' },
    primary: { bg: 'var(--sn-primary-bg)', fg: 'var(--sn-primary)', border: 'var(--sn-primary-bg-2)', hover: 'var(--sn-primary-bg-2)' },
    aria:    { bg: 'var(--sn-primary-bg)', fg: 'var(--sn-primary)', border: 'var(--sn-primary)', hover: 'var(--sn-primary-bg-2)' },
    danger:  { bg: 'var(--sn-error-light)', fg: 'var(--sn-error-fg)', border: 'var(--sn-error-border)', hover: '#fde4e4' },
    success: { bg: 'var(--sn-success-light)', fg: 'var(--sn-success-fg)', border: 'var(--sn-success-border)', hover: '#d4f7e4' },
    ghost:   { bg: 'transparent', fg: 'var(--sn-gray-600)', border: 'transparent', hover: 'var(--sn-gray-100)' },
  }[kind];
  const isAria = kind === 'aria';
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        height: isAria ? 22 : 28,
        padding: isAria ? '0 8px' : '0 10px',
        background: hover ? palette.hover : palette.bg,
        color: palette.fg,
        border: `1px solid ${palette.border}`,
        borderRadius: isAria ? 999 : 8,
        fontSize: isAria ? 10 : 12,
        fontWeight: isAria ? 700 : 600,
        cursor: 'pointer',
        transition: 'background 120ms, border-color 120ms',
        ...style,
      }}
    >
      {icon}
      {children}
    </button>
  );
}

/** Section card */
function SectionCard({ title, subtitle, right, children, padded=true, badge, glow=false, kind='default', innerRef, ...rest }) {
  const tone = {
    default: { border: 'var(--sn-gray-200)' },
    success: { border: 'var(--sn-success-border)' },
    warning: { border: 'var(--sn-warning-border)' },
    error:   { border: 'var(--sn-error-border)' },
  }[kind] || {border: 'var(--sn-gray-200)'};

  return (
    <div ref={innerRef} className={`sn-card${glow ? ' sn-glow' : ''}`} style={{borderColor: tone.border, ...((rest.style) || {})}} {...{...rest, style: undefined}}>
      {(title || right) && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: '14px 18px',
          borderBottom: '1px solid var(--sn-gray-200)',
        }}>
          {badge}
          <div style={{flex:1, minWidth: 0}}>
            {title && <div style={{fontSize: 14, fontWeight: 700, color: 'var(--sn-gray-900)', letterSpacing: -0.1}}>{title}</div>}
            {subtitle && <div style={{fontSize: 12, color: 'var(--sn-gray-500)', marginTop: 2}}>{subtitle}</div>}
          </div>
          {right}
        </div>
      )}
      <div style={padded ? {padding: 18} : {}}>{children}</div>
    </div>
  );
}

/** Key/Value list */
function KV({ k, v, mono=false, copy=false, onCopy }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '140px 1fr auto',
      alignItems: 'baseline',
      padding: '6px 0',
      gap: 12,
    }}>
      <div style={{fontSize: 12, color: 'var(--sn-gray-500)', fontWeight: 500}}>{k}</div>
      <div style={{
        fontSize: 13, color: 'var(--sn-gray-900)', fontWeight: 600,
        fontFamily: mono ? 'ui-monospace, SF Mono, Menlo, monospace' : undefined,
        fontVariantNumeric: 'tabular-nums',
        wordBreak: 'break-word',
      }}>{v}</div>
      {copy && <button onClick={onCopy} className="sn-link-soft" style={{fontSize: 11, opacity: 0.7}}><Icon.Copy size={12}/></button>}
    </div>
  );
}

/** Divider */
function Divider({ style }) {
  return <div style={{height: 1, background: 'var(--sn-gray-200)', ...style}} />;
}

/** Tooltip-style hint label */
function HintLabel({ children, color='var(--sn-gray-500)' }) {
  return <div style={{fontSize: 10, fontWeight: 700, color}}>{children}</div>;
}

window.fmtMoney = fmtMoney;
window.fmtMoneyFull = fmtMoneyFull;
window.fmtPct = fmtPct;
window.fmtNum = fmtNum;
Object.assign(window, { Pill, StatusPill, Avatar, AriaAvatar, ChipButton, SectionCard, KV, Divider, HintLabel });

</script>

// ============================================================
// sidebar.jsx
// ============================================================
/* ============================================================
   Left navigation rail — Application Stages + Resources
   Two stacked cards matching the live ABC origination console.
   ============================================================ */

const STAGES = [
  { id: 'line-structure',       label: 'Line Structure',         state: 'done'   },
  { id: 'line-information',     label: 'Line Information',       state: 'done'   },
  { id: 'documents',            label: 'Documents',              state: 'done'   },
  { id: 'credit-information',   label: 'Credit Information',     state: 'done'   },
  { id: 'collateral',           label: 'Collateral Information', state: 'active' },
  { id: 'credit-approval',      label: 'Credit Approval',        state: 'todo'   },
  { id: 'set-line-live',        label: 'Set Line Live',          state: 'todo'   },
];

const RESOURCES = [
  { id: 'tasks', label: 'Application Task(s)', icon: 'Doc'   },
  { id: 'user',  label: 'User',                icon: 'User'  },
  { id: 'vault', label: 'Document Vault',      icon: 'Folder', muted: true },
];

function Sidebar({ onAskAria }) {
  return (
    <nav style={{
      width: 232,
      flexShrink: 0,
      background: '#F0F1F4',
      padding: '24px 12px',
      display: 'flex', flexDirection: 'column', gap: 24,
      overflowY: 'auto',
    }}>
      {/* Stage list card */}
      <div style={{
        background: '#fff',
        border: '1px solid #E5E7EB',
        borderRadius: 12,
        padding: '8px 0',
        boxShadow: '0 1px 2px rgba(15,23,42,0.04)',
      }}>
        {STAGES.map(s => <StageRow key={s.id} stage={s} />)}
      </div>

      {/* Resources card */}
      <div style={{
        background: '#fff',
        border: '1px solid #E5E7EB',
        borderRadius: 12,
        padding: '8px 0',
        boxShadow: '0 1px 2px rgba(15,23,42,0.04)',
      }}>
        {RESOURCES.map(r => <ResourceRow key={r.id} item={r} />)}
      </div>

      {/* Spacer */}
      <div style={{flex: 1}}/>

      {/* Ask Aria button */}
      {onAskAria && (
        <button
          onClick={onAskAria}
          style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '10px 12px',
            background: '#fff',
            border: '1px solid #E5E7EB',
            borderRadius: 12,
            cursor: 'pointer',
            boxShadow: '0 1px 2px rgba(15,23,42,0.04)',
            transition: 'box-shadow 140ms, border-color 140ms',
            textAlign: 'left',
            width: '100%',
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = '#1A53FF'; e.currentTarget.style.boxShadow = '0 0 0 3px rgba(26,83,255,0.08)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = '#E5E7EB'; e.currentTarget.style.boxShadow = '0 1px 2px rgba(15,23,42,0.04)'; }}
        >
          {/* Aria avatar */}
          <div style={{
            width: 32, height: 32, borderRadius: 10, flexShrink: 0,
            background: 'linear-gradient(135deg, #1e3a8a 0%, #1A53FF 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <Icon.Sparkle size={14} style={{color: '#fff'}}/>
          </div>

          {/* Text */}
          <div style={{flex: 1, minWidth: 0}}>
            <div style={{fontSize: 13, fontWeight: 600, color: '#0F172A', lineHeight: 1.3}}>Ask Aria</div>
            <div style={{fontSize: 11, color: '#6B7280', lineHeight: 1.3}}>AI co-pilot</div>
          </div>

          {/* Live badge */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 4,
            padding: '2px 7px', borderRadius: 6,
            background: '#F0FDF4',
            border: '1px solid #BBF7D0',
          }}>
            <div style={{width: 5, height: 5, borderRadius: '50%', background: '#16A34A', animation: 'sn-pulse 1.6s ease-in-out infinite'}}/>
            <span style={{fontSize: 10, fontWeight: 700, color: '#15803D'}}>Online</span>
          </div>
        </button>
      )}
    </nav>
  );
}

function StageRow({ stage }) {
  const { state, label } = stage;
  const active = state === 'active';
  return (
    <div
      style={{
        height: 36,
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '0 14px',
        margin: '2px 6px',
        borderRadius: 8,
        cursor: 'pointer',
        background: active ? '#EAF1FF' : 'transparent',
        transition: 'background 140ms',
      }}
      onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = '#F3F4F6'; }}
      onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}
    >
      <StageMarker state={state} />
      <span style={{
        fontSize: 13,
        fontWeight: active ? 600 : 500,
        color: active ? '#1A53FF' : '#374151',
        whiteSpace: 'nowrap',
        overflow: 'hidden',
        textOverflow: 'ellipsis',
      }}>{label}</span>
    </div>
  );
}

function StageMarker({ state }) {
  if (state === 'done') {
    return (
      <span style={{
        width: 18, height: 18, borderRadius: '50%',
        background: '#16A34A',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        flexShrink: 0,
        color: '#fff',
      }}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </span>
    );
  }
  if (state === 'active') {
    return (
      <span style={{
        width: 18, height: 18, borderRadius: '50%',
        border: '2px solid #1A53FF',
        background: '#fff',
        flexShrink: 0,
      }}/>
    );
  }
  // todo
  return (
    <span style={{
      width: 18, height: 18, borderRadius: '50%',
      border: '2px solid #D1D5DB',
      background: '#fff',
      flexShrink: 0,
    }}/>
  );
}

function ResourceRow({ item }) {
  const I = Icon[item.icon];
  return (
    <div
      style={{
        height: 36,
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '0 14px',
        margin: '2px 6px',
        borderRadius: 8,
        cursor: 'pointer',
        color: item.muted ? '#9CA3AF' : '#374151',
        transition: 'background 140ms',
      }}
      onMouseEnter={(e) => e.currentTarget.style.background = '#F3F4F6'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
    >
      <I size={16} style={{flexShrink: 0, color: item.muted ? '#9CA3AF' : '#6B7280'}}/>
      <span style={{
        fontSize: 13, fontWeight: 500,
        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
      }}>{item.label}</span>
    </div>
  );
}

window.Sidebar = Sidebar;

</script>

  const initial = React.useMemo(() => {

  // Re-sync if allCollected changes and no external map

      <div style={{
        padding: '8px 12px',
        fontSize: 11, color: 'var(--sn-gray-500)',

/* ─── Single document row ─── */

function DocRow({ doc, status, isLast, onClick }) {
  const isCollected = status === 'collected';

  const badgeMap = {
    'on-file':  { label: 'Already on file', bg: 'rgba(18, 183, 106, 0.10)', color: 'var(--sn-success-fg)' },

function RelationshipDiagram({ app, trust, resolved }) {
  const wrapRef = React.useRef(null);
  const [w, setW] = React.useState(760);
  const H = 380;
  const green = '#16A34A', red = '#D92D20', gray = '#CBD5E1';
  const pledgeColor = resolved ? green : red;

  React.useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver(([e]) => setW(Math.max(520, e.contentRect.width)));
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  // Node dimensions
  const NW = 186, NH = 108;
  const pad = 20;
  const nodes = {
    asset:    { x: w/2 - NW/2,        y: pad },
    pledgor:  { x: w * 0.22 - NW/2,   y: H - NH - pad },
    borrower: { x: w * 0.78 - NW/2,   y: H - NH - pad },
  };

  // Anchor helpers
  const bot   = (n) => ({ x: nodes[n].x + NW/2, y: nodes[n].y + NH });
  const top   = (n) => ({ x: nodes[n].x + NW/2, y: nodes[n].y });
  const right = (n) => ({ x: nodes[n].x + NW,   y: nodes[n].y + NH/2 });
  const left  = (n) => ({ x: nodes[n].x,         y: nodes[n].y + NH/2 });

  const a  = bot('asset');
  const pl = top('pledgor');
  const br = top('borrower');
  const pledgorR  = right('pledgor');
  const borrowerL = left('borrower');

  // Pill positions — offset away from midpoint so they don't overlap nodes
  const pillAP = { x: (a.x + pl.x)/2 - 14, y: (a.y + pl.y)/2 };
  const pillPB = { x: (pledgorR.x + borrowerL.x)/2, y: pledgorR.y - 2 };

  return (
    <div style={{padding: '28px 28px 20px', background: 'linear-gradient(160deg, #F8FAFC 0%, #fff 50%)'}}>
      <div ref={wrapRef} style={{position: 'relative', width: '100%', height: H}}>

        {/* SVG connector lines — drawn behind nodes */}

        </svg>

        {/* Asset → Pledgor: ownership verified pill */}
        <div style={{position:'absolute', left: pillAP.x, top: pillAP.y, transform:'translate(-50%,-50%)',
          background:'#F0FDF4', border:'1px solid #BBF7D0', borderRadius:999,
          padding:'2px 9px', fontSize:10, fontWeight:700, color:green,
          display:'inline-flex', alignItems:'center', gap:3, whiteSpace:'nowrap',
          boxShadow:'0 1px 4px rgba(22,163,74,0.12)', pointerEvents:'none',
        }}>
          <Icon.Check size={10}/>Owner = Pledgor
        </div>

        {/* Pledgor ↔ Borrower: pledge status pill */}
        <div style={{position:'absolute', left: pillPB.x, top: pillPB.y, transform:'translate(-50%,-50%)',
          background: resolved ? '#F0FDF4' : '#FEF2F2',
          border:`1px solid ${resolved ? '#BBF7D0' : '#FECACA'}`,
          borderRadius:999, padding:'3px 10px',
          fontSize:10, fontWeight:700, color: resolved ? green : red,
          display:'inline-flex', alignItems:'center', gap:4, whiteSpace:'nowrap',
          boxShadow:'0 1px 6px rgba(0,0,0,0.08)', pointerEvents:'none',
        }}>
          {resolved ? <><Icon.Check size={10}/>Beneficiary verified</> : <><Icon.AlertTriangle size={10}/>Relationship unverified</>}
        </div>

        {/* Node cards — positioned absolutely */}
        {/* Asset Account */}
        <div style={{position:'absolute', left:nodes.asset.x, top:nodes.asset.y, width:NW}}>
          <RMapNode kind="asset" eyebrow="Asset Account"
            title={app.custodian}
            detail={<span style={{fontFamily:'ui-monospace,monospace',fontSize:11}}>{app.account}</span>}
            stat={`$${(app.marketValue/1e6).toFixed(1)}M`} statColor={green}
          />
        </div>

        {/* Pledgor */}
        <div style={{position:'absolute', left:nodes.pledgor.x, top:nodes.pledgor.y, width:NW}}>
          <RMapNode kind="pledgor" eyebrow="Account Owner & Pledgor"
            title={trust.name}
            detail={`${trust.type} · ${trust.jurisdiction}`}
            badge={<span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:9,fontWeight:700,color:'#15803D',background:'#DCFCE7',border:'1px solid #BBF7D0',borderRadius:4,padding:'2px 6px'}}>
              <Icon.User size={9}/>Trustee: Owen Powell
            </span>}
          />
        </div>

        {/* Borrower */}
        <div style={{position:'absolute', left:nodes.borrower.x, top:nodes.borrower.y, width:NW}}>
          <RMapNode kind={resolved ? 'resolved' : 'borrower'} eyebrow="Borrower"
            title="Sarah Powell"
            detail="Individual · NY · SSN ••••5847"
            badge={resolved
              ? <span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:9,fontWeight:700,color:green,background:'#DCFCE7',border:'1px solid #BBF7D0',borderRadius:4,padding:'2px 6px'}}><Icon.Check size={9}/>Pledge resolved</span>
              : <span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:9,fontWeight:700,color:'#B42318',background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:4,padding:'2px 6px'}}><Icon.AlertTriangle size={9}/>Third-party pledge</span>
            }
          />
        </div>

      </div>

      {/* Legend */}
      <div style={{display:'flex',alignItems:'center',gap:20,marginTop:12,paddingTop:12,borderTop:'1px solid var(--sn-gray-100)',fontSize:11,color:'var(--sn-gray-500)'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:18,height:2,background:green,opacity:0.7,borderRadius:1}}/> Verified ownership</div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:18,height:2,borderTop:`2px dashed ${red}`,opacity:0.7}}/>
          Third-party pledge
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:18,height:2,background:gray,borderRadius:1}}/> Indirect</div>
      </div>
    </div>
  );
}

function RMapNode({ kind, eyebrow, title, detail, stat, statColor, badge }) {
  const styles = {
    asset:    { bg: 'linear-gradient(135deg,#EFF6FF 0%,#fff 100%)', border: '#BFDBFE', eyebrow: '#1D4ED8', shadow: 'none' },
    trustee:  { bg: '#fff', border: '#D1FAE5', eyebrow: '#15803D', shadow: 'none' },
    pledgor:  { bg: 'linear-gradient(135deg,#F0FDF4 0%,#fff 100%)', border: '#86EFAC', eyebrow: '#15803D', shadow: 'none' },
    borrower: { bg: '#fff', border: '#FECACA', eyebrow: '#B42318', shadow: 'none' },
    resolved: { bg: 'linear-gradient(135deg,#F0FDF4 0%,#fff 100%)', border: '#86EFAC', eyebrow: '#15803D', shadow: 'none' },
  };
  const s = styles[kind] || styles.asset;

  return (
    <div style={{
      background: s.bg,
      border: `1.5px solid ${s.border}`,
      borderRadius: 12,
      padding: '14px 16px',
      boxShadow: s.shadow,
    }}>
      <div style={{fontSize: 9, fontWeight: 800, color: s.eyebrow, marginBottom: 5}}>{eyebrow}</div>
      <div style={{fontSize: 14, fontWeight: 700, color: '#0F172A', lineHeight: 1.25, marginBottom: 3}}>{title}</div>
      <div style={{fontSize: 11, color: '#6B7280', lineHeight: 1.4}}>{detail}</div>
      {stat && <div style={{fontSize: 16, fontWeight: 800, color: statColor, marginTop: 8, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.4}}>{stat}</div>}
      {badge && <div style={{marginTop: 8}}>{badge}</div>}
    </div>
  );
}

<script type="text/babel">
// ============================================================
// app.jsx
// ============================================================
/* ============================================================
   App entry — orchestrates state, tweaks, layout
   ============================================================ */

const { useState, useEffect, useRef, useCallback } = React;

// Find the nearest scrollable ancestor and smooth-scroll the target into view.
// Manual rAF tween because behavior:'smooth' silently fails on non-window
// scroll containers in some sandboxed iframe contexts.
function scrollIntoMain(target) {
  if (!target) return;
  let scroller = target.parentElement;
  while (scroller) {
    const style = getComputedStyle(scroller);
    const oy = style.overflowY;
    if ((oy === 'auto' || oy === 'scroll') && scroller.scrollHeight > scroller.clientHeight) break;
    scroller = scroller.parentElement;
  }
  if (!scroller) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  const targetRect = target.getBoundingClientRect();
  const scrollerRect = scroller.getBoundingClientRect();
  const endTop = Math.max(0, (targetRect.top - scrollerRect.top) + scroller.scrollTop - 16);
  const startTop = scroller.scrollTop;
  const distance = endTop - startTop;
  if (Math.abs(distance) < 2) return;
  const duration = Math.min(700, 220 + Math.abs(distance) * 0.6);
  const t0 = performance.now();
  const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  const tick = (now) => {
    const p = Math.min(1, (now - t0) / duration);
    scroller.scrollTop = startTop + distance * easeInOutCubic(p);
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function App() {
  const demo = window.__DEMO_STATE || {};
  const [density] = useState('comfortable');
  const [ariaMode, setAriaMode] = useState('hidden');
  const [aiView, setAiView] = useState(false); // false = baseline, true = AI Collateral Verification

  // Verification state
  const initialChecks = (() => {
    const arr = [false, false, false, false];
    const step = Math.max(0, Math.min(4, demo.demoStep ?? 0));
    for (let i = 0; i < step; i++) arr[i] = true;
    return arr;
  })();
  const [taskChecked, setTaskChecked] = useState(initialChecks);
  const [activityExtras, setActivityExtras] = useState([]);
  const [aiTrigger, setAiTrigger] = useState(null);
  const [ownershipGlow, setOwnershipGlow] = useState(false);
  const [pledgeGlow, setPledgeGlow] = useState(false);

  // Inbound toast — shown after step 3 ✓ but step 4 not done
  const [inboundShown, setInboundShown] = useState(false);
  const [inboundDismissed, setInboundDismissed] = useState(false);

  // Document verification status — lifted to App so Verify flow can drive it
  const [docStatusMap, setDocStatusMap] = useState(() => {
    const m = {};
    REQUIRED_DOCS.forEach(d => { m[d.id] = d.status || 'pending'; });
    return m;
  });
  const [verifying, setVerifying] = useState(false);

  // Refs for scrolling
  const ownershipRef = useRef(null);
  const pledgeRef = useRef(null);
  const actionItemsRef = useRef(null);

  // Confirm ownership from document preview → check task 0 + scroll back to action items
  const handleOwnershipConfirmed = useCallback(() => {
    // Check task 0 if not already checked
    setTaskChecked(prev => {
      if (prev[0]) return prev;
      const next = [...prev]; next[0] = true;
      setActivityExtras(a => [
        { user: 'William Chen', role: 'UW', action: 'Asset ownership confirmed — Fidelity custodian statement reviewed and verified', time: 'Just now', color: '#1068F4', highlight: true },
        ...a,
      ]);
      return next;
    });
    // Glow the ownership card briefly
    setOwnershipGlow(true);
    setTimeout(() => setOwnershipGlow(false), 2400);
    // Scroll back to action items after short delay
    setTimeout(() => {
      scrollIntoMain(actionItemsRef.current);
    }, 400);
  }, []);

  // Apply density attribute to body
  useEffect(() => { document.body.dataset.density = density; }, [density]);

  // Inbound toast trigger
  useEffect(() => {
    if (taskChecked[2] && !taskChecked[3] && !inboundDismissed) {
      const t = setTimeout(() => setInboundShown(true), 800);
      return () => clearTimeout(t);
    } else {
      setInboundShown(false);
    }
  }, [taskChecked, inboundDismissed]);

  const toggleTask = useCallback((i) => {
    setTaskChecked(prev => {
      const wasChecking = !prev[i];
      const next = prev.map((v, idx) => idx === i ? !v : v);

      if (wasChecking) {
        // Add activity log entries
        const map = {
          0: [{ user: 'William Chen', role: 'UW', action: 'Asset ownership confirmed — I83894899 held by Powell Family Trust', time: 'Just now', color: '#1068F4', highlight: true }],
          1: [{ user: 'William Chen', role: 'UW', action: 'Third-party pledge risk assessed — enforcement risk documented', time: 'Just now', color: '#1068F4', highlight: true }],
          2: [
            { user: 'William Chen', role: 'UW', action: 'Email sent to advisor — BL-2024-1147 document request', time: 'Just now', color: '#1068F4', highlight: true },
            { user: 'Aria', role: 'AI', action: 'Generated advisor email: Beneficial Interest, Civil Record, Trustee Resolution', time: 'Just now', color: '#1e3a8a', highlight: true },
          ],
          3: [
            { user: 'Aria', role: 'AI', action: 'Relationship verified — beneficiary standing confirmed, third-party pledge resolved', time: 'Just now', color: '#1e3a8a', highlight: true },
            { user: 'Rebecca Simmons', role: 'Advisor', action: 'Submitted: Beneficial Interest, Civil Record, Trustee Resolution', time: 'Just now', color: '#F59E0B', highlight: true },
          ],
        };
        if (map[i]) setActivityExtras(prev => [...map[i], ...prev]);
      }
      return next;
    });
  }, []);

  const askAria = useCallback((msg) => {
    setAiTrigger({ msg, key: Date.now() });
    if (ariaMode === 'hidden') setAriaMode('docked');
  }, [ariaMode]);

  const scrollToOwnership = useCallback(() => {
    scrollIntoMain(ownershipRef.current);
    setOwnershipGlow(true);
    setTimeout(() => setOwnershipGlow(false), 2400);
  }, []);

  const scrollToPledge = useCallback(() => {
    scrollIntoMain(pledgeRef.current);
    setPledgeGlow(true);
    setTimeout(() => setPledgeGlow(false), 2400);
  }, []);

  // AI-driven document verification flow
  const verifyDocuments = useCallback(async () => {
    if (verifying) return;
    setVerifying(true);

    // 1. Scroll to & expand pledge card — verification happens entirely there
    scrollIntoMain(pledgeRef.current);
    setPledgeGlow(true);
    setTimeout(() => setPledgeGlow(false), 2400);

    // 2. Animate: mark each doc collected with a 600ms stagger
    const order = REQUIRED_DOCS.map(d => d.id);
    for (let i = 0; i < order.length; i++) {
      await new Promise(r => setTimeout(r, 600));
      setDocStatusMap(prev => ({ ...prev, [order[i]]: 'collected' }));
    }

    // 3. Auto-complete task 4
    await new Promise(r => setTimeout(r, 400));
    setTaskChecked(prev => {
      if (prev[3]) return prev;
      const next = [...prev]; next[3] = true;
      setActivityExtras(a => [
        { user: 'Aria', role: 'AI', action: 'All relationship documents verified — third-party pledge resolved', time: 'Just now', color: '#1e3a8a', highlight: true },
        { user: 'Rebecca Simmons', role: 'Advisor', action: 'Submitted: Beneficial Interest, Civil Record, Trustee Resolution', time: 'Just now', color: '#F59E0B', highlight: true },
        ...a,
      ]);
      return next;
    });

    setVerifying(false);
  }, [verifying]);

  return (
    <div style={{height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden'}}>
      <TopChrome
        application={APPLICATION}
        onBack={() => {
          if (aiView) { setAiView(false); }
          else { alert('In the full app: returns to Origination overview'); }
        }}
        onAskAria={askAria}
        onLaunchAI={() => setAiView(true)}
        aiView={aiView}
      />

      <div style={{flex: 1, display: 'flex', overflow: 'hidden', minHeight: 0}}>
        <Sidebar onAskAria={() => { setAriaMode('docked'); setAiTrigger({ msg: '', key: Date.now() }); }} />

        {!aiView ? (
          <BaselineLineStructure onLaunchAI={() => setAiView(true)} />
        ) : (
          <MainPage
            taskChecked={taskChecked}
            onToggleTask={toggleTask}
            ownershipRef={ownershipRef}
            pledgeRef={pledgeRef}
            ownershipGlow={ownershipGlow}
            pledgeGlow={pledgeGlow}
            onScrollToOwnership={scrollToOwnership}
            onScrollToPledge={scrollToPledge}
            onAskAria={askAria}
            onBack={() => setAiView(false)}
            docStatusMap={docStatusMap}
            setDocStatusMap={setDocStatusMap}
            onVerifyDocs={verifyDocuments}
            verifying={verifying}
            onOwnershipConfirmed={handleOwnershipConfirmed}
            actionItemsRef={actionItemsRef}
          />
        )}

        {aiView && ariaMode === 'docked' && (
          <AriaPanel
            mode={ariaMode}
            onChangeMode={setAriaMode}
            suggestedTrigger={aiTrigger?.msg}
            onTriggerHandled={() => setAiTrigger(null)}
          />
        )}
      </div>

      {/* Floating modes overlaid */}
      {aiView && ariaMode !== 'docked' && (
        <AriaPanel
          mode={ariaMode}
          onChangeMode={setAriaMode}
          suggestedTrigger={aiTrigger?.msg}
          onTriggerHandled={() => setAiTrigger(null)}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>

</body>
