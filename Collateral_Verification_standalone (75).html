// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────

// before our handler exists and the toolbar toggle would silently no-op.

// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.

  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function DocumentPreviewModal({ open, onClose, title, subtitle, pages, onConfirm, confirmLabel, onFlag, aiSummary }) {
  const [page, setPage] = React.useState(1);
  const [confirmed, setConfirmed] = React.useState(false);
  const [activeField, setActiveField] = React.useState(null);
  const docRef = React.useRef(null);
  const total = pages.length;
  const Page = pages[page - 1];

  React.useEffect(() => { if (open) { setPage(1); setConfirmed(false); setActiveField(null); } }, [open]);

  // Highlight matching text in document after page renders
  React.useEffect(() => {
    if (!docRef.current) return;
    // Clear previous highlights
    docRef.current.querySelectorAll('.aria-hl').forEach(el => {
      const parent = el.parentNode;
      if (parent) { parent.replaceChild(document.createTextNode(el.textContent), el); parent.normalize(); }
    });
    if (activeField === null || !aiSummary) return;
    const raw = aiSummary.matches[activeField].quote || '';
    const needle = raw.slice(0, 40).toLowerCase().trim();
    if (!needle) return;

    const walker = document.createTreeWalker(docRef.current, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    let n;
    while ((n = walker.nextNode())) textNodes.push(n);

    for (const node of textNodes) {
      const idx = node.textContent.toLowerCase().indexOf(needle);
      if (idx === -1) continue;
      try {
        const range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, Math.min(idx + raw.length, node.textContent.length));
        const mark = document.createElement('mark');
        mark.className = 'aria-hl';
        mark.style.cssText = 'background:#BFDBFE;color:inherit;border-radius:2px;padding:0 2px;';
        range.surroundContents(mark);
        setTimeout(() => mark.scrollIntoView({ behavior:'smooth', block:'center' }), 80);
      } catch(e) {}
      break;
    }
  }, [activeField, page]);

  // Esc to close
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setPage(p => Math.min(total, p + 1));
      if (e.key === 'ArrowLeft')  setPage(p => Math.max(1, p - 1));
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, total, onClose]);

  const handleConfirm = () => {
    setConfirmed(true);
    setTimeout(() => {
      onClose();
      if (onConfirm) onConfirm();
    }, 600);
  };

  if (!open) return null;

  return (

      </div>

<script type="text/babel">
// ============================================================
// primitives.jsx
// ============================================================
/* ============================================================
   Primitive components: pills, avatars, helpers
   ============================================================ */

const fmtMoney = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtMoneyFull = (n) => n.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
const fmtPct = (n, d=0) => (n*100).toFixed(d) + '%';
const fmtNum = (n) => n.toLocaleString('en-US');

/** Pill — kind: success | warning | error | info | neutral */
function Pill({ kind='neutral', dot=true, children, style }) {
  return (
    <span className={`sn-pill sn-pill-${kind}`} style={style}>
      {dot && <span className="sn-dot" />}
      {children}
    </span>
  );
}

/** Status pill with icon (used in big cards) */
function StatusPill({ kind='success', label, icon }) {
  const cfg = {
    success: { bg: 'var(--sn-success-light)', fg: 'var(--sn-success-fg)', border: 'var(--sn-success-border)', defaultIcon: null },
    warning: { bg: 'var(--sn-warning-light)', fg: 'var(--sn-warning-fg)', border: 'var(--sn-warning-border)', defaultIcon: <Icon.AlertTriangle size={12}/> },
    error:   { bg: 'var(--sn-error-light)',   fg: 'var(--sn-error-fg)',   border: 'var(--sn-error-border)',   defaultIcon: <Icon.AlertTriangle size={12}/> },
    info:    { bg: 'var(--sn-primary-bg)',    fg: 'var(--sn-primary)',    border: 'var(--sn-primary-bg-2)',   defaultIcon: <Icon.Info size={12}/> },
    neutral: { bg: 'var(--sn-gray-100)',      fg: 'var(--sn-gray-600)',   border: 'var(--sn-gray-200)',       defaultIcon: null },
  }[kind];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      height: 26, padding: '0 10px',
      background: cfg.bg, color: cfg.fg, border: `1px solid ${cfg.border}`,
      borderRadius: 999,
      fontSize: 12, fontWeight: 600,
    }}>
      {icon || cfg.defaultIcon}
      {label}
    </span>
  );
}

/** StatusButton — tri-state: 'pending' → 'open' → 'done'
 *  pending: grey outlined "Pending" — click to expand card
 *  open:    blue primary "Confirm" — click to confirm and complete
 *  done:    green pill "Verified" — non-interactive final state
 */
function StatusButton({ state, doneLabel = 'Verified', openLabel, onPending, onConfirm, onRevoke }) {
  const configs = {
    pending: {
      bg: '#fff', color: 'var(--sn-gray-500)', border: 'var(--sn-gray-300)',
      icon: null, label: 'Pending',
      onClick: onPending, interactive: true,
    },
    open: {
      bg: 'var(--sn-primary-bg)', color: 'var(--sn-primary)', border: 'var(--sn-primary-bg-2)',
      icon: <Icon.ArrowRight size={11}/>, label: openLabel || 'Confirm',
      onClick: onConfirm, interactive: true,
    },
    done: {
      bg: 'var(--sn-success-light)', color: 'var(--sn-success-fg)', border: 'var(--sn-success-border)',
      icon: <Icon.Check size={11}/>, label: doneLabel,
      onClick: null, interactive: false,
    },
  };
  const c = configs[state] || configs.pending;
  return (
    <span
      onClick={c.onClick}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 5,
        height: 26, padding: '0 10px',
        background: c.bg, color: c.color,
        border: `1px solid ${c.border}`,
        borderRadius: 999,
        fontSize: 11, fontWeight: 700,
        flexShrink: 0,
        cursor: c.interactive ? 'pointer' : 'default',
        userSelect: 'none',
        transition: 'background 140ms, color 140ms, border-color 140ms',
      }}
    >
      {c.icon}
      {c.label}
    </span>
  );
}

/** Avatar — initials, color from a hash */
function Avatar({ name, size=28, color, role }) {
  const initials = name.split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase();
  const bg = color || 'var(--sn-primary)';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: bg,
      color: '#fff',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size <= 24 ? 9 : 11, fontWeight: 700,
      flexShrink: 0,
      letterSpacing: 0.2,
    }} title={name}>
      {initials}
    </div>
  );
}

/** Avatar styled for AI (Aria) */
function AriaAvatar({ size=28 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: 'linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%)',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0,
      boxShadow: '0 1px 3px rgba(30, 58, 138, 0.3)',
    }}>
      <Icon.Sparkle size={size * 0.5} style={{ color: '#fff' }} />
    </div>
  );
}

/** A button-shaped chip used for inline actions */
function ChipButton({ children, onClick, kind='default', icon, style, title }) {
  const palette = {
    default: { bg: 'var(--sn-white)', fg: 'var(--sn-gray-700)', border: 'var(--sn-gray-300)', hover: 'var(--sn-gray-50)' },
    primary: { bg: 'var(--sn-primary-bg)', fg: 'var(--sn-primary)', border: 'var(--sn-primary-bg-2)', hover: 'var(--sn-primary-bg-2)' },
    aria:    { bg: 'var(--sn-primary-bg)', fg: 'var(--sn-primary)', border: 'var(--sn-primary)', hover: 'var(--sn-primary-bg-2)' },
    danger:  { bg: 'var(--sn-error-light)', fg: 'var(--sn-error-fg)', border: 'var(--sn-error-border)', hover: '#fde4e4' },
    success: { bg: 'var(--sn-success-light)', fg: 'var(--sn-success-fg)', border: 'var(--sn-success-border)', hover: '#d4f7e4' },
    ghost:   { bg: 'transparent', fg: 'var(--sn-gray-600)', border: 'transparent', hover: 'var(--sn-gray-100)' },
  }[kind];
  const isAria = kind === 'aria';
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        height: isAria ? 22 : 28,
        padding: isAria ? '0 8px' : '0 10px',
        background: hover ? palette.hover : palette.bg,
        color: palette.fg,
        border: `1px solid ${palette.border}`,
        borderRadius: isAria ? 999 : 8,
        fontSize: isAria ? 10 : 12,
        fontWeight: isAria ? 700 : 600,
        cursor: 'pointer',
        transition: 'background 120ms, border-color 120ms',
        ...style,
      }}
    >
      {icon}
      {children}
    </button>
  );
}

/** Section card */
function SectionCard({ title, subtitle, right, children, padded=true, badge, glow=false, kind='default', innerRef, ...rest }) {
  const tone = {
    default: { border: 'var(--sn-gray-200)' },
    success: { border: 'var(--sn-success-border)' },
    warning: { border: 'var(--sn-warning-border)' },
    error:   { border: 'var(--sn-error-border)' },
  }[kind] || {border: 'var(--sn-gray-200)'};

  return (
    <div ref={innerRef} className={`sn-card${glow ? ' sn-glow' : ''}`} style={{borderColor: tone.border, ...((rest.style) || {})}} {...{...rest, style: undefined}}>
      {(title || right) && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: '16px 24px',
          borderBottom: '1px solid var(--sn-gray-200)',
        }}>
          {badge}
          <div style={{flex:1, minWidth: 0}}>

    </div>
  );
}

/** Key/Value list */
function KV({ k, v, mono=false, copy=false, onCopy }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '140px 1fr auto',
      alignItems: 'baseline',
      padding: '6px 0',

      {copy && <button onClick={onCopy} className="sn-link-soft" style={{fontSize: 11, opacity: 0.7}}><Icon.Copy size={12}/></button>}
    </div>
  );
}

/** Divider */
function Divider({ style }) {
  return <div style={{height: 1, background: 'var(--sn-gray-200)', ...style}} />;
}

/** Tooltip-style hint label */
function HintLabel({ children, color='var(--sn-gray-500)' }) {

        background: '#fff',

}

/* ─── Relationship verification documents — interactive list ─── */

function RelationshipDocs({ docs, allCollected, onAskAria, externalStatusMap, setExternalStatusMap, verifying, previewMode, onConfirm }) {
  const STATUS_ORDER = ['collected', 'na', 'pending'];
  const nextStatus = (s) => STATUS_ORDER[(STATUS_ORDER.indexOf(s) + 1) % STATUS_ORDER.length];
  const [previewDoc, setPreviewDoc] = React.useState(null);

  const initial = React.useMemo(() => {
    const map = {};
    docs.forEach(d => {
      // In previewMode (Step 2 risk assessment) — all docs shown as pending regardless of real status
      map[d.id] = previewMode
        ? (d.status === 'na' ? 'na' : 'pending')
        : (allCollected && d.status !== 'na' ? 'collected' : (d.status || 'pending'));
    });
    return map;
  }, [docs, allCollected, previewMode]);

  const [internalStatusMap, setInternalStatusMap] = React.useState(initial);
  const statusMap = React.useMemo(() => {
    const base = externalStatusMap || internalStatusMap;
    // Ensure every doc has a status — fall back to doc.status for missing keys
    const resolved = {};
    docs.forEach(d => {
      const val = base[d.id] ?? d.status ?? 'pending';
      // na docs can never become collected — hard rule
      resolved[d.id] = (d.status === 'na') ? 'na' : val;
    });
    return resolved;
  }, [externalStatusMap, internalStatusMap, docs]);
  const setStatusMap = (updater) => {
    if (setExternalStatusMap) setExternalStatusMap(updater);
    else setInternalStatusMap(updater);
  };

  // Re-sync if allCollected changes and no external map
  React.useEffect(() => {
    if (!externalStatusMap) setInternalStatusMap(initial);
  }, [initial, externalStatusMap]);

  const counts = docs.reduce((acc, d) => {
    const s = statusMap[d.id];
    acc[s] = (acc[s] || 0) + 1;
    return acc;
  }, {});
  const verified = counts.collected || 0;
  const na = counts.na || 0;
  const total = docs.length;

  return (
    <div style={{
      background: '#fff',
      overflow: 'hidden',
    }}>
      {/* previewMode hint */}
      {previewMode && (
        <div style={{padding: '8px 12px', fontSize: 11, color: 'var(--sn-gray-500)', background: '#fff', borderBottom: '1px solid var(--sn-gray-200)'}}>
          Documents will be requested in Step 3 and collected in Step 4 after advisor responds.
        </div>
      )}

      {/* Rows */}
      <div>
        {docs.map((d, idx) => {
          const displayDoc = previewMode && d.badge === 'on-file' && d.status !== 'na'
            ? { ...d, badge: 'required' }
            : d;
          return (
            <DocRow
              key={d.id}
              doc={displayDoc}
              status={statusMap[d.id]}
              isLast={idx === docs.length - 1}
              onClick={previewMode ? () => {} : () => setStatusMap(m => ({ ...m, [d.id]: nextStatus(m[d.id]) }))}
              onPreview={previewMode ? null : (doc) => setPreviewDoc(doc)}
            />
          );
        })}
      </div>

      {/* Footer — Re-run + Confirm right-aligned together, matching card footer pattern */}
      {!previewMode && (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 8,
          padding: '12px 16px',

          background: 'var(--sn-gray-25)',
        }}>
          <button
            onClick={() => onAskAria && onAskAria('Re-run relationship document verification for BL-2024-1147')}
            style={{
              height: 32, padding: '0 14px', borderRadius: 7,
              border: '1px solid var(--sn-gray-300)',
              background: '#fff', cursor: 'pointer',
              fontSize: 13, fontWeight: 600, color: 'var(--sn-gray-600)',
            }}
          >
            Re-run
          </button>
          <button
            onClick={onConfirm}
            style={{
              height: 32, padding: '0 20px', borderRadius: 8,
              border: 'none', cursor: 'pointer',
              background: 'var(--sn-primary)', color: '#fff',
              fontSize: 13, fontWeight: 700,
            }}
          >
            Confirm
          </button>
        </div>
      )}

      {previewDoc && (
        <DocumentPreviewModal
          open={!!previewDoc}
          onClose={() => setPreviewDoc(null)}
          title={previewDoc.name}
          subtitle={previewDoc.desc}
          pages={(() => {
            const map = { 'photo-id': window.PHOTO_ID_PAGES, 'birth': window.BIRTH_CERT_PAGES, 'trust-cert': window.TRUST_CERT_LEGAL_PAGES, 'trustee-res': window.TRUSTEE_RES_PAGES, 'beneficial': window.BENEFICIAL_PAGES };
            return map[previewDoc.id] || previewDoc.pages || null;
          })() || [() => (
            <div style={{textAlign:'center', padding:'80px 0', color:'var(--sn-gray-400)'}}>
              <Icon.Doc size={48}/>
              <div style={{fontSize:14, fontWeight:600, color:'var(--sn-gray-500)', marginTop:16}}>{previewDoc.name}</div>
              <div style={{fontSize:12, color:'var(--sn-gray-400)', marginTop:8}}>Document collected and on file — full preview available in Document Vault.</div>
            </div>
          )]}
          aiSummary={(() => {
            const map = { 'photo-id': window.PHOTO_ID_SUMMARY, 'birth': window.BIRTH_CERT_SUMMARY, 'trust-cert': window.TRUST_CERT_SUMMARY, 'trustee-res': window.TRUSTEE_RES_SUMMARY, 'beneficial': window.BENEFICIAL_SUMMARY };
            return map[previewDoc.id] || previewDoc.aiSummary || null;
          })()}
          onConfirm={null}
          onFlag={null}
        />
      )}
    </div>
  );
}

/* ─── Single document row ─── */

function DocRow({ doc, status, isLast, onClick, onPreview }) {
  const isCollected = status === 'collected';
  const isNA        = status === 'na';
  const isOptional  = doc.badge === 'optional';

  // Green treatment applies to ALL collected docs (required or optional)
  const rowBg = isCollected ? 'rgba(18,183,106,0.06)' : '#fff';

  const docLabel = (doc.badge === 'on-file' || doc.badge === 'required')
    ? { label: 'Required', bg: 'rgba(16,104,244,0.08)', color: 'var(--sn-primary)' }
    : { label: 'Optional', bg: 'var(--sn-gray-100)',   color: 'var(--sn-gray-600)' };

  const toTitleCase = s => s.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1));

  return (
    <div
      onClick={isNA || isCollected ? undefined : onClick}
      style={{
        display: 'grid', gridTemplateColumns: '28px 1fr',
        gap: 12, alignItems: 'flex-start',
        padding: '12px 16px', background: rowBg,
        borderBottom: isLast ? 'none' : '1px solid var(--sn-gray-200)',
        cursor: isNA || isCollected ? 'default' : 'pointer',
        transition: 'background 140ms',
        opacity: (isNA && !isOptional) ? 0.55 : 1,
      }}
      onMouseEnter={e => { if (!isCollected && !isNA) e.currentTarget.style.background = 'var(--sn-gray-25)'; }}
      onMouseLeave={e => { e.currentTarget.style.background = rowBg; }}
    >
      {/* 1. Check circle — green when collected (required or optional), grey dash for required N/A */}
      <div style={{paddingTop: 2}}>
        {isCollected ? (
          <div style={{width:22,height:22,borderRadius:'50%',border:'1.5px solid var(--sn-success)',color:'var(--sn-success)',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
            <Icon.Check size={12}/>
          </div>
        ) : isNA && !isOptional ? (
          <div style={{width:22,height:22,borderRadius:'50%',background:'var(--sn-gray-200)',color:'var(--sn-gray-500)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700}}>—</div>
        ) : (
          <div style={{width:22,height:22,borderRadius:'50%',border:'1.5px solid var(--sn-gray-300)',background:'transparent'}}/>
        )}
      </div>

      <div style={{minWidth:0}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, marginBottom:3}}>
          {/* Title + label inline */}
          <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
            <span style={{
              fontSize:13, fontWeight:700,
              color:(isNA && !isOptional) ? 'var(--sn-gray-500)' : 'var(--sn-gray-900)',
              textDecoration:(isNA && !isOptional) ? 'line-through' : 'none',
              lineHeight:1.3,
            }}>{toTitleCase(doc.name)}</span>
            <span style={{flexShrink:0,fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:docLabel.bg,color:docLabel.color}}>{docLabel.label}</span>
          </div>

          {/* Eye icon — ONLY when document is collected. Never for optional uncollected, never for pending. */}
          {isCollected && onPreview && (
            <div style={{display:'flex', alignItems:'center', gap:8, flexShrink:0}}>
              {/* Verified pill for all collected docs */}
              {(() => {
                return <span style={{fontSize:10,fontWeight:700,whiteSpace:'nowrap',padding:'2px 8px',borderRadius:999,background:'rgba(3,152,85,0.10)',color:'var(--sn-success-fg)',border:'1px solid rgba(3,152,85,0.25)'}}>Verified</span>;

              <button
                onClick={e => { e.stopPropagation(); onPreview(doc); }}
                title="Preview"
                style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--sn-primary)',display:'inline-flex',alignItems:'center',justifyContent:'center',padding:2,lineHeight:1}}

                <Icon.Eye size={16}/>

          )}

        {/* Description */}
        <div style={{fontSize:12, color:'var(--sn-gray-500)', lineHeight:1.5}}>{doc.desc}</div>
      </div>
    </div>
  );
}

/* ─── Application context strip ─── */
function ApplicationContextStrip({ app, trust }) {
  const cushion = app.borrowingBase - app.requestedAmount;
  const coverageRatio = app.borrowingBase / app.requestedAmount;
  const eligibleValue = HOLDINGS.filter(h => h.eligible).reduce((s, h) => s + h.value, 0);
  const ineligibleValue = HOLDINGS.filter(h => !h.eligible).reduce((s, h) => s + h.value, 0);
  const eligibleRatio = eligibleValue / app.marketValue;

  const metrics = [
    {
      label: 'LTV ratio',
      value: fmtPct(app.ltv),
      sub: `${fmtMoney(app.requestedAmount)} requested`,
      color: 'var(--sn-gray-900)',
      accent: 'var(--sn-primary)',
      barWidth: `${app.ltv * 100}%`,
      tag: 'Policy gate',
      tagColor: 'var(--sn-primary)',
      tagBg: 'var(--sn-primary-bg)',
    },
    {
      label: 'Borrowing base',
      value: fmtMoney(app.borrowingBase),
      sub: `from ${fmtMoney(app.marketValue)} market value`,
      color: 'var(--sn-success-fg)',
      accent: 'var(--sn-success)',
      barWidth: `${(app.borrowingBase / app.marketValue) * 100}%`,
      highlight: true,
      tag: 'Eligible collateral',
      tagColor: 'var(--sn-success-fg)',
      tagBg: 'var(--sn-success-light)',
    },
    {
      label: 'Coverage ratio',
      value: `${coverageRatio.toFixed(2)}×`,
      sub: 'Base ÷ requested line',
      color: coverageRatio >= 1.5 ? 'var(--sn-success-fg)' : 'var(--sn-warning-fg)',
      accent: coverageRatio >= 1.5 ? 'var(--sn-success)' : 'var(--sn-warning)',
      barWidth: `${Math.min(100, (coverageRatio / 2) * 100)}%`,
      tag: coverageRatio >= 1.5 ? 'Sufficient' : 'Monitor',
      tagColor: coverageRatio >= 1.5 ? 'var(--sn-success-fg)' : 'var(--sn-warning-fg)',
      tagBg: coverageRatio >= 1.5 ? 'var(--sn-success-light)' : 'var(--sn-warning-light)',
    },
    {
      label: 'Eligible ratio',
      value: fmtPct(eligibleRatio),
      sub: `${fmtMoney(ineligibleValue)} ineligible`,
      color: eligibleRatio >= 0.85 ? 'var(--sn-success-fg)' : 'var(--sn-warning-fg)',
      accent: eligibleRatio >= 0.85 ? 'var(--sn-success)' : 'var(--sn-warning)',
      barWidth: `${eligibleRatio * 100}%`,
      tag: eligibleRatio >= 0.85 ? 'Clean' : 'Review needed',
      tagColor: eligibleRatio >= 0.85 ? 'var(--sn-success-fg)' : 'var(--sn-warning-fg)',
      tagBg: eligibleRatio >= 0.85 ? 'var(--sn-success-light)' : 'var(--sn-warning-light)',
    },
  ];

  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: `1fr 1px 1fr 1px 1fr 1px 1fr`,
      background: '#fff',
      border: '1px solid var(--sn-gray-200)',
      borderRadius: 12,
      overflow: 'hidden',
      boxShadow: 'var(--sn-shadow-xs)',
    }}>
      {metrics.map((m, i) => (
        <React.Fragment key={m.label}>
          {i > 0 && <div style={{background: 'var(--sn-gray-200)', width: 1, alignSelf: 'stretch'}}/>}
          <div style={{
            padding: '16px 20px',
            background: m.highlight ? 'linear-gradient(180deg, rgba(3,152,85,0.03) 0%, transparent 100%)' : 'transparent',
            display: 'flex', flexDirection: 'column', gap: 2,
          }}>
            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4}}>
              <div style={{fontSize: 11, fontWeight: 600, color: 'var(--sn-gray-500)'}}>{m.label}</div>
              <span style={{
                fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 4,
                background: m.tagBg, color: m.tagColor,
              }}>{m.tag}</span>
            </div>
            <div style={{fontSize: 20, fontWeight: 800, color: m.color, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.5, lineHeight: 1.1}}>{m.value}</div>
            <div style={{fontSize: 11, color: 'var(--sn-gray-400)', marginTop: 2}}>{m.sub}</div>
            <div style={{height: 3, background: 'var(--sn-gray-100)', borderRadius: 99, marginTop: 8, overflow: 'hidden'}}>
              <div style={{height: '100%', borderRadius: 99, background: m.accent, width: m.barWidth, opacity: 0.7}}/>
            </div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

<script type="text/babel">
// ============================================================
// app.jsx
// ============================================================
/* ============================================================
   App entry — orchestrates state, tweaks, layout
   ============================================================ */

const { useState, useEffect, useRef, useCallback } = React;

// Find the nearest scrollable ancestor and smooth-scroll the target into view.
// Manual rAF tween because behavior:'smooth' silently fails on non-window
// scroll containers in some sandboxed iframe contexts.
function scrollIntoMain(target) {
  if (!target) return;
  let scroller = target.parentElement;
  while (scroller) {
    const style = getComputedStyle(scroller);
    const oy = style.overflowY;
    if ((oy === 'auto' || oy === 'scroll') && scroller.scrollHeight > scroller.clientHeight) break;
    scroller = scroller.parentElement;
  }
  if (!scroller) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  const targetRect = target.getBoundingClientRect();
  const scrollerRect = scroller.getBoundingClientRect();
  const endTop = Math.max(0, (targetRect.top - scrollerRect.top) + scroller.scrollTop - 16);
  const startTop = scroller.scrollTop;
  const distance = endTop - startTop;
  if (Math.abs(distance) < 2) return;
  const duration = Math.min(700, 220 + Math.abs(distance) * 0.6);
  const t0 = performance.now();
  const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  const tick = (now) => {
    const p = Math.min(1, (now - t0) / duration);
    scroller.scrollTop = startTop + distance * easeInOutCubic(p);
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function App() {
  const demo = window.__DEMO_STATE || {};
  const [density] = useState('comfortable');
  const [ariaMode, setAriaMode] = useState('hidden');
  const [aiView, setAiView] = useState(false); // false = baseline, true = AI Collateral Verification

  // Verification state
  const initialChecks = (() => {
    const arr = [false, false, false, false];
    const step = Math.max(0, Math.min(4, demo.demoStep ?? 0));
    for (let i = 0; i < step; i++) arr[i] = true;
    return arr;
  })();
  const [taskChecked, setTaskChecked] = useState(initialChecks);
  const [activityExtras, setActivityExtras] = useState([]);
  const [aiTrigger, setAiTrigger] = useState(null);
  const [ownershipGlow, setOwnershipGlow] = useState(false);
  const [pledgeGlow, setPledgeGlow] = useState(false);
  const [docVerifyGlow, setDocVerifyGlow] = useState(false);
  const [docVerifyOpen, setDocVerifyOpen] = useState(false);
  const [docsReceived, setDocsReceived] = useState(false);

  // Inbound toast — shown after step 3 ✓ but step 4 not done
  const [inboundShown, setInboundShown] = useState(false);
  const [inboundDismissed, setInboundDismissed] = useState(false);

  // Document verification status — lifted to App so Verify flow can drive it
  const [docStatusMap, setDocStatusMap] = useState(() => {
    const m = {};
    REQUIRED_DOCS.forEach(d => { m[d.id] = d.status || 'pending'; });
    return m;
  });
  const [verifying, setVerifying] = useState(false);

  // Refs for scrolling
  const ownershipRef = useRef(null);
  const pledgeRef = useRef(null);
  const actionItemsRef = useRef(null);
  const docVerifyRef = useRef(null);

  // Confirm ownership from document preview → check task 0 + scroll back to action items
  const handleOwnershipConfirmed = useCallback((revoke = false) => {
    setTaskChecked(prev => {
      const next = [...prev];
      next[0] = !revoke;
      if (!revoke) {
        setActivityExtras(a => [
          { user: 'William Chen', role: 'UW', action: 'Asset ownership confirmed — Fidelity custodian statement reviewed and verified', time: 'Just now', color: '#1068F4', highlight: true },
          ...a,
        ]);
      }
      return next;
    });
    if (!revoke) {
      setOwnershipGlow(true);
      setTimeout(() => setOwnershipGlow(false), 2400);
      setTimeout(() => scrollIntoMain(actionItemsRef.current), 400);
    }
  }, []);

  // Pledge acknowledged → check task 1 + scroll back to action items
  const handleConfirmDocs = useCallback(() => {
    setTaskChecked(prev => {
      if (prev[3]) return prev;
      const next = [...prev]; next[3] = true;
      return next;
    });
    setActivityExtras(a => [
      { user: 'William Chen', role: 'UW', action: 'Relationship documents confirmed — third-party pledge resolved', time: 'Just now', color: '#1068F4', highlight: true },
      { user: 'Aria', role: 'AI', action: 'All relationship documents verified — beneficiary standing confirmed', time: 'Just now', color: '#1e3a8a', highlight: true },
      ...a,
    ]);
    // Collapse Task 4 card and scroll back to action items
    setDocVerifyOpen(false);
    setTimeout(() => scrollIntoMain(actionItemsRef.current), 300);
  }, []);

  const handlePledgeAcknowledged = useCallback((revoke = false) => {
    setTaskChecked(prev => {
      const next = [...prev];
      next[1] = !revoke;
      if (!revoke) {
        setActivityExtras(a => [
          { user: 'William Chen', role: 'UW', action: 'Third-party pledge enforcement risk acknowledged — proceeding to document collection', time: 'Just now', color: '#1068F4', highlight: true },
          ...a,
        ]);
      }
      return next;
    });
    if (!revoke) {
      setPledgeGlow(true);
      setTimeout(() => setPledgeGlow(false), 2400);
      setTimeout(() => scrollIntoMain(actionItemsRef.current), 400);
    }
  }, []);

  // Inbound toast trigger — fires after email sent (task 3 ✓) but docs not yet verified (task 4 ✗)
  // Uses a realistic 4s delay to simulate the attorney's response arriving
  useEffect(() => {
    if (taskChecked[2] && !taskChecked[3] && !inboundDismissed) {
      const t = setTimeout(() => setInboundShown(true), 4000);
      return () => clearTimeout(t);
    } else {
      setInboundShown(false);
    }
  }, [taskChecked, inboundDismissed]);

  const toggleTask = useCallback((i) => {
    setTaskChecked(prev => {
      const wasChecking = !prev[i];
      const next = prev.map((v, idx) => idx === i ? !v : v);

      if (wasChecking) {
        // Add activity log entries
        const map = {
          0: [{ user: 'William Chen', role: 'UW', action: 'Asset ownership confirmed — I83894899 held by Powell Family Trust', time: 'Just now', color: '#1068F4', highlight: true }],
          1: [{ user: 'William Chen', role: 'UW', action: 'Third-party pledge risk assessed — enforcement risk documented', time: 'Just now', color: '#1068F4', highlight: true }],
          2: [
            { user: 'William Chen', role: 'UW', action: 'Email sent to advisor — BL-2024-1147 document request', time: 'Just now', color: '#1068F4', highlight: true },
            { user: 'Aria', role: 'AI', action: 'Generated advisor email: Beneficial Interest, Civil Record, Trustee Resolution', time: 'Just now', color: '#1e3a8a', highlight: true },
          ],
          3: [
            { user: 'Aria', role: 'AI', action: 'Relationship verified — beneficiary standing confirmed, third-party pledge resolved', time: 'Just now', color: '#1e3a8a', highlight: true },
            { user: 'Rebecca Simmons', role: 'Advisor', action: 'Submitted: Beneficial Interest, Civil Record, Trustee Resolution', time: 'Just now', color: '#F59E0B', highlight: true },
          ],
        };
        if (map[i]) setActivityExtras(prev => [...map[i], ...prev]);
      }
      return next;
    });
  }, []);

  const askAria = useCallback((msg) => {
    setAiTrigger({ msg, key: Date.now() });
    if (ariaMode === 'hidden') setAriaMode('docked');
  }, [ariaMode]);

  const scrollToOwnership = useCallback(() => {
    scrollIntoMain(ownershipRef.current);
    setOwnershipGlow(true);
    setTimeout(() => setOwnershipGlow(false), 2400);
  }, []);

  const scrollToPledge = useCallback(() => {
    scrollIntoMain(pledgeRef.current);
    setPledgeGlow(true);
    setTimeout(() => setPledgeGlow(false), 2400);
  }, []);

  // AI-driven document verification flow
  const verifyDocuments = useCallback(async () => {
    if (verifying) return;
    setVerifying(true);
    setDocsReceived(true); // Unlock step 4 immediately when documents arrive

    // Animate: mark each non-na doc collected with a 600ms stagger
    const order = REQUIRED_DOCS.filter(d => d.status !== 'na').map(d => d.id);
    for (let i = 0; i < order.length; i++) {
      await new Promise(r => setTimeout(r, 600));
      setDocStatusMap(prev => ({ ...prev, [order[i]]: 'collected' }));
    }

    setVerifying(false);
  }, [verifying]);

  return (
    <div style={{height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden'}}>
      <TopChrome
        application={APPLICATION}
        onBack={() => {
          if (aiView) { setAiView(false); }
          else { alert('In the full app: returns to Origination overview'); }
        }}
        onAskAria={askAria}
        onLaunchAI={() => setAiView(true)}
        aiView={aiView}
        hasNotification={inboundShown && !inboundDismissed}
        notification={inboundShown || inboundDismissed ? true : null}
        onReadNotification={() => {
          setInboundShown(false);
          setInboundDismissed(true);
          setDocsReceived(true);
          verifyDocuments();
        }}
      />

      <div style={{flex: 1, display: 'flex', overflow: 'hidden', minHeight: 0, gap: 0}}>
        <Sidebar onAskAria={() => { setAriaMode('docked'); setAiTrigger({ msg: '', key: Date.now() }); }} collateralDone={taskChecked.every(Boolean)} />

        {!aiView ? (
          <BaselineLineStructure onLaunchAI={() => setAiView(true)} />
        ) : (
          <MainPage
            taskChecked={taskChecked}
            onToggleTask={toggleTask}
            ownershipRef={ownershipRef}
            pledgeRef={pledgeRef}
            ownershipGlow={ownershipGlow}
            pledgeGlow={pledgeGlow}
            docVerifyGlow={docVerifyGlow}
            docVerifyOpen={docVerifyOpen}
            setDocVerifyOpen={setDocVerifyOpen}
            setDocVerifyGlow={setDocVerifyGlow}
            docsReceived={docsReceived}
            onScrollToOwnership={scrollToOwnership}
            onScrollToPledge={scrollToPledge}
            onAskAria={askAria}
            onBack={() => setAiView(false)}
            docStatusMap={docStatusMap}
            setDocStatusMap={setDocStatusMap}
            onVerifyDocs={verifyDocuments}
            verifying={verifying}
            onOwnershipConfirmed={handleOwnershipConfirmed}
            actionItemsRef={actionItemsRef}
            onPledgeAcknowledged={handlePledgeAcknowledged}
            docVerifyRef={docVerifyRef}
            onConfirmDocs={handleConfirmDocs}
          />
        )}

        {aiView && ariaMode === 'docked' && (
          <AriaPanel
            mode={ariaMode}
            onChangeMode={setAriaMode}
            suggestedTrigger={aiTrigger?.msg}
            onTriggerHandled={() => setAiTrigger(null)}
            taskChecked={taskChecked}
          />
        )}
      </div>

      {/* Floating modes overlaid */}
      {aiView && ariaMode !== 'docked' && (
        <AriaPanel
          mode={ariaMode}
          onChangeMode={setAriaMode}
          suggestedTrigger={aiTrigger?.msg}
          onTriggerHandled={() => setAiTrigger(null)}
          taskChecked={taskChecked}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
